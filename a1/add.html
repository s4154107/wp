<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PetConnect | Add Pet</title>
  <link rel="icon" type="image/x-icon" href="assets/images/favicon.ico">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Material+Icons&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <header>
    <nav class="navbar navbar-expand-lg site-navbar">
      <div class="container">
        <a class="navbar-brand" href="index.html">
          <span class="material-icons align-middle me-1">pets</span>PetConnect
        </a>

        <button class="navbar-toggler text-white border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-label="Toggle navigation">
          <span class="material-icons text-white">menu</span>
        </button>

        <div class="collapse navbar-collapse" id="mainNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="index.html"><span class="material-icons nav-icon">home</span>Home</a></li>
            <li class="nav-item"><a class="nav-link" href="pets.html"><span class="material-icons nav-icon">menu_book</span>Browse Pets</a></li>
            <li class="nav-item"><a class="nav-link" href="gallery.html"><span class="material-icons nav-icon">photo_library</span>Gallery</a></li>
            <li class="nav-item"><a class="nav-link active" href="add.html"><span class="material-icons nav-icon">add_circle</span>Add Pet</a></li>
          </ul>
        </div>
      </div>
    </nav>
  </header>

  <main class="site-main">
    <section class="container py-5">
      <h1 class="page-title"><span class="material-icons section-icon">add_circle</span>Add a New Pet for Adoption</h1>

      <form class="add-form" id="petForm" novalidate>
        <div class="row g-4">
          <div class="col-md-6">
            <label for="name" class="form-label">Pet Name *</label>
            <input type="text" class="form-control" id="name" name="name" placeholder="Enter pet name" required>
          </div>

          <div class="col-md-6">
            <label for="species" class="form-label">Species *</label>
            <select class="form-select" id="species" name="species" required>
              <option value="">Select species</option>
              <option>Dog</option>
              <option>Cat</option>
              <option>Bird</option>
              <option>Rabbit</option>
              <option>Other</option>
            </select>
          </div>

          <div class="col-md-6">
            <label for="breed" class="form-label">Breed</label>
            <input type="text" class="form-control" id="breed" name="breed" placeholder="Enter breed" required>
          </div>

          <div class="col-md-3">
            <label for="age_years" class="form-label">Age (Years)</label>
            <input type="number" class="form-control" id="age_years" name="age_years" placeholder="Years" min="0" required>
          </div>

          <div class="col-md-3">
            <label for="age_months" class="form-label">Age (Months)</label>
            <input type="number" class="form-control" id="age_months" name="age_months" placeholder="Months" min="0" max="11" required>
          </div>

          <div class="col-md-4">
            <label for="gender" class="form-label">Gender *</label>
            <select class="form-select" id="gender" name="gender" required>
              <option value="">Select gender</option>
              <option>Male</option>
              <option>Female</option>
            </select>
          </div>

          <div class="col-md-4">
            <label for="size" class="form-label">Size *</label>
            <select class="form-select" id="size" name="size" required>
              <option value="">Select size</option>
              <option>Small</option>
              <option>Medium</option>
              <option>Large</option>
              <option>Extra Large</option>
            </select>
          </div>

          <div class="col-md-4">
            <label for="adoption_fee" class="form-label">Adoption Fee ($) *</label>
            <input type="number" class="form-control" id="adoption_fee" name="adoption_fee" placeholder="Enter fee" min="0" step="0.01" required>
          </div>

          <div class="col-12">
            <label for="description" class="form-label">Description *</label>
            <textarea class="form-control" id="description" name="description" rows="4" placeholder="Describe the pet's personality and characteristics" required></textarea>
          </div>

          <div class="col-12">
            <label for="health_info" class="form-label">Health Information</label>
            <textarea class="form-control" id="health_info" name="health_info" rows="3" placeholder="Enter health and vaccination information" required></textarea>
          </div>

          <div class="col-12">
            <label for="status" class="form-label">Status *</label>
            <select class="form-select" id="status" name="status" required>
              <option value="">Select status</option>
              <option>Available</option>
              <option>Pending</option>
              <option>Adopted</option>
            </select>
          </div>

          <div class="col-12">
            <label for="image" class="form-label"><span class="material-icons upload-icon">photo_camera</span>Pet Photo</label>
            <input type="file" class="form-control" id="image" name="image" accept=".jpg,.jpeg,.png,.gif,.webp" required>
            <div id="imageFeedback" class="image-feedback"></div>
            <div id="imagePreviewWrapper" class="preview-wrapper d-none">
              <img id="imagePreview" src="" alt="Image preview" class="preview-image">
            </div>
          </div>

          <div class="col-12 d-flex gap-2">
            <button type="submit" class="btn btn-primary-custom">
              <span class="material-icons btn-icon">add_circle</span>Add Pet
            </button>
            <button type="reset" class="btn btn-secondary-custom">
              <span class="material-icons btn-icon">cancel</span>Cancel
            </button>
          </div>
        </div>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container text-center">
      <p>© 2026 s4154107. Connecting pets with loving homes.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/scripts.js"></script>
</body>
</html>
